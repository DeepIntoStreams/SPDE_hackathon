# Galerkin Transformer — shared config for 1D datasets
# Mirrors the structure and interpolation scheme of fno.yaml

model: GalerkinTransformer
equation: Phi41+
data: Phi41+sigma01_xi_trc128_1200

data_path: '../../data_gen/results/${equation}/${data}.mat'
dim_x: 128
T: 51
sub_t: 1
task: xi   # 'xi' or 'u0xi'

# Architecture — grid search: d_model:[32,64], n_layers:[3,4], n_head:[4,8]
d_model: 64
n_head: 4
n_layers: 4
dim_feedforward: 256  # grid search: [128, 256]
dropout: 0.0

ntrain: 840
nval: 180
ntest: 180
batch_size: 20
epochs: 1000
learning_rate: 0.001
weight_decay: 1e-4
plateau_patience: 50
delta: 0.0001
plateau_terminate: 100

print_every: 100
seed: 3407

save_dir: '../result/${model}_${equation}/'
checkpoint_file: '${data}.pth'
log_file: '${data}_log'