sim:
  a: 0
  b: 1.0
  Nx: 128  # dx = (b-a)/Nx
  s: 0
  t: 0.05
  Nt: 50  # dt = (t-s)/Nt
  truncation: [32,64,128,256]
  sigma: [1, 0.1]  # coefficient of additive diffusive term
  fix_u0: [True, False] # [True,False] True--fix; False--vary
  num: 1200
  lam: [0.5, 0.05]  # coefficient of the non-linear term
  # basis and boundary are fixed for KPZ (sincos + Periodic)
  basis: sincos
  boundary: Periodic

seed: 42

save_dir: '../results/KPZ+/'
save_name: 'KPZ+reno'